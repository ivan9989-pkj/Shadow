<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowStrike Supply</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/cookies.css">
    <!-- Scripts -->
    <script src="./js/java.js"></script>
    <script src="./js/imagenrandom.js"></script>
    <script src="./js/hamburguesa.js"></script>
</head>
<body>
    <header class="header">
        <div class="contenedor">
            <div class="barra">
                <a href="/">
                    <img class="Foto-logo" src="./img/Imagen2.png" alt="">
                </a>
                <div id="clockdate">
                    <div class="clockdate-wrapper">
                      <div id="clock"></div>
                      <div id="date"></div>
                    </div>
                  </div>
                    <div class="derecha">
                    <div class="hamburguesa-container">
                        <img id="hamburguesa" src="./img/hamburguesa.svg" alt="Menú Hamburguesa">
                    </div>
                    <nav class="navegador" id="menu--navegacion">
                        <a href="/">Inicio</a>
                        <a href="./nosotros.html">Nosotros</a>
                        <a href="./contacto.html">Contacto</a>
                        <a href="./info.html">Información</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div id="cookieConsent" class="cookie-consent">
        <p>Este sitio web utiliza cookies. ¿Aceptas nuestra política de cookies?</p>
        <button id="btnAceptar">Aceptar</button>
        <button id="btnDenegar">Denegar</button>
    </div>

    <footer id="imagen-contenedor">
        <div class="saludo-container">
            <div class="saludo">
                <h2 id="h2color">Bienvenido/a</h2>
                <!-- Párrafo para mostrar el nombre -->
                <p id="userGreeting"></p>
                <button id="borrarPreferencias">Borrar o crear Preferencias</button>
            </div>
        </div>
        <img id="random-image" src="" alt="Random Imagen">
        <div class="informacion-contenedor">
            <a class="informacion-boton" href="./nosotros.html">Sobre Nosotros</a>
            <a class="informacion-boton" href="./info.html">Más Información de Airsoft</a>
        </div>
    </footer>

    <script src="./js/cookies.js"></script>
    <script src="./js/geo.js"></script>



<script src="./js/localstorage.js">
</script>
</body>
</html>
